services:
  backend:
    build: ./backend
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/smartcart
      - JWT_SECRET=smartcart_super_secret_change_later
    depends_on:
      - mongo

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
